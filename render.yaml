services:
  - type: web
    name: sistema-financeiro
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend && gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NODE_VERSION
        value: 18.17.0
      - key: DATABASE_URL
        fromDatabase:
          name: supabase-db
          property: connectionString
